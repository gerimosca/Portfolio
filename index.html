<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--CAMBIAR POR docs/css/styles.min.css AL FINALIZAR EL PROYECTO-->
    <link rel="stylesheet" href="./src/css/styles.css" />
    <title>Portfolio</title>
  </head>
  <body>
    <header class="header">
      <div class="switches">
        <div id="toggle-theme" class="toggle-theme">
          <img id="toggle-icon" src="./docs/assets/images/moon.svg" alt="icon moon" class="toggle-theme__icon" />
          <p id="toggle-text" class="toggle-theme__text">Dark Mode</p>
        </div>
      </div>
      <div id="toggle-colors" class="colors">
        <div data-color="hsl(214,84%,56%)" class="colors__item colors__item--blue"></div>
        <div data-color="hsl(150, 77%, 24%)" class="colors__item colors__item--green"></div>
        <div data-color="hsl(276,84%,56%)" class="colors__item colors__item--purple"></div>
        <div data-color="hsl(27, 87%, 42%)" class="colors__item colors__item--orange"></div>
      </div>
    </header>
    <main class="main">
      <section class="column column--left">
        <!-- Profile Card -->
        <article class="card card--profile">
          <div class="card__image-container">
            <img src="./docs/assets/images/profile.jpg" alt="profile image" />
          </div>
        </article>
      </section>
    </main>
    <script src="./src/js/script.js"></script>
  </body>
</html>
